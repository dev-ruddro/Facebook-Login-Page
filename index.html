<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Facebook Login</title>
  </head>
  <link rel="stylesheet" href="style.css" />
  <body>
    <div class="full-body">
      <div class="text-container">
        <img src="picture/facebook_no_bg.png" alt="" />
        <p class="text-container-txt">
          Facebook helps you connect and share with the people in your life.
        </p>
      </div>
      <div>
        <div class="login-container">
          <input
            class="email-login"
            type="text"
            placeholder="Enter address or phone number"
          />
          <input class="pass-login" type="password" placeholder="Password" />
          <button class="login-button">Log in</button>
          <p class="forgot-pass">Forgotten Password?</p>
          <hr />
          <button class="new-acc-btn">Create new account</button>
        </div>
        <p><b>Create a Page</b>for a celebrity, brand or business.</p>
      </div>
    </div>
  </body>
</html>
