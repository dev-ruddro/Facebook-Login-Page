<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Facebook Login</title>
  </head>
  <link rel="stylesheet" href="style.css" />
  <body>
    <div class="full-body">
      <div class="text-container">
        <div class="logo">
          <img src="picture/Facebook_logo_PNG9.png" alt="Facebook" />
        </div>
        <p class="text-container-txt">Facebook helps you connect and share</p>
        <p class="text-container-txt2">with the people in your life.</p>
      </div>
      <div class="right-side">
        <div class="login-container">
          <input
            class="email-login"
            type="text"
            placeholder="Enter address or phone number"
          />
          <input class="pass-login" type="password" placeholder="Password" />
          <button class="login-button">Log in</button>
          <p class="forgot-pass">Forgotten Password?</p>
          <hr />
          <button id="new-acc-btn">Create new account</button>
        </div>
        <p class="last">
          <b>Create a Page</b>&nbsp;for a celebrity, brand or business.
        </p>
      </div>
    </div>
  </body>
</html>
